<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Happy Birthday Cycie! 🌹</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Nunito:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      min-height: -webkit-fill-available;
      background: #000;
      font-family: 'Nunito', 'Segoe UI', Arial, sans-serif;
      color: #6d1f3e;
      overflow-x: hidden;
      -webkit-tap-highlight-color: transparent;
    }
    #heart-canvas {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 1; pointer-events: none;
    }
    #confetti-canvas {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none; z-index: 2;
      opacity: 0; transition: opacity .6s;
    }
    #confetti-canvas.show { opacity: 1; }
    #page {
      position: relative; z-index: 10;
      display: flex; flex-direction: column;
      align-items: center; justify-content: flex-start;
      min-height: 100vh; min-height: -webkit-fill-available;
      padding: clamp(20px,5vw,40px) 16px clamp(16px,4vw,32px);
    }
/* ══ SAKURA LOCK SCREEN ══ */
#sakura-lock {
  position: fixed; inset: 0; z-index: 9000;
  background: radial-gradient(ellipse at 50% 40%, #1a0010 0%, #0d0008 60%, #000 100%);
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; overflow: hidden;
  transition: opacity 1.2s ease;
}
#sakura-lock.hide { opacity: 0; pointer-events: none; }

#sakura-particles {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  pointer-events: none; z-index: 0;
}

#sakura-content {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  z-index: 1;
  display: flex; flex-direction: column;
  align-items: center; gap: 0;
  width: 90%; max-width: 380px;
  padding: 20px; box-sizing: border-box;
}

#sakura-lock-icon {
  font-size: clamp(52px, 15vw, 82px);
  margin-bottom: clamp(8px,2vh,14px);
  animation: sakuraLockPulse 2s ease-in-out infinite;
  filter: drop-shadow(0 0 20px rgba(255,150,180,0.8));
  text-align: center; line-height: 1; display: block;
}
@keyframes sakuraLockPulse {
  0%,100% { transform: scale(1);    filter: drop-shadow(0 0 16px rgba(255,150,180,0.7)); }
  50%      { transform: scale(1.08); filter: drop-shadow(0 0 32px rgba(255,180,210,1.0)); }
}

#sakura-hint {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(13px, 3.5vw, 18px);
  font-style: italic;
  color: rgba(255,180,210,0.75);
  letter-spacing: 2px; margin-bottom: 6px;
  text-align: center;
  text-shadow: 0 0 12px rgba(255,120,160,0.5);
}
#sakura-clue {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(11px, 2.8vw, 14px);
  font-style: italic;
  color: rgba(255,150,180,0.5);
  letter-spacing: 1px;
  margin-bottom: clamp(18px,3vh,28px);
  text-align: center;
}
#sakura-input-wrap {
  width: min(300px, 80vw);
  display: flex; flex-direction: column; align-items: center;
  position: relative;
}
#sakura-input {
  width: 100%; padding: 14px 20px;
  font-size: clamp(15px, 4vw, 18px);
  background: rgba(30,0,18,0.85);
  border: 1px solid rgba(255,150,180,0.35);
  border-radius: 14px; color: #ffb3d1;
  text-align: center; letter-spacing: 3px; outline: none;
  box-shadow: 0 0 20px rgba(220,80,130,0.12);
  transition: border-color .3s, box-shadow .3s;
  -webkit-appearance: none; font-family: 'Nunito', sans-serif;
}
#sakura-input:focus {
  border-color: rgba(255,150,180,0.75);
  box-shadow: 0 0 30px rgba(220,80,130,0.35);
}
#sakura-input::placeholder { color: rgba(255,150,180,0.3); letter-spacing: 1px; }
#sakura-btn {
  margin-top: 14px; width: 100%; padding: 13px;
  font-size: clamp(14px, 3.5vw, 16px);
  background: linear-gradient(135deg, #2d0018, #5a0030);
  border: 1px solid rgba(255,150,180,0.4);
  border-radius: 14px; color: #ffb3d1;
  letter-spacing: 2px; cursor: pointer;
  box-shadow: 0 0 20px rgba(220,80,130,0.2);
  transition: background .3s, box-shadow .3s, transform .15s;
  -webkit-appearance: none; font-family: 'Nunito', sans-serif;
}
#sakura-btn:hover, #sakura-btn:active {
  background: linear-gradient(135deg, #3d0022, #7a0040);
  box-shadow: 0 0 35px rgba(255,100,150,0.45);
  transform: scale(1.02);
}
#sakura-error {
  margin-top: 12px;
  font-size: clamp(12px, 3vw, 14px);
  color: #ff6b8a; letter-spacing: 1px; min-height: 20px;
  text-shadow: 0 0 10px rgba(255,100,130,0.5);
  opacity: 0; transition: opacity .3s; text-align: center;
}
#sakura-error.show { opacity: 1; }
#sakura-success {
  font-size: clamp(16px, 4vw, 22px);
  color: #ffb3d1; letter-spacing: 3px;
  opacity: 0; transition: opacity .5s; text-align: center;
  text-shadow: 0 0 20px rgba(255,150,180,0.9);
  margin-top: 10px;
}
#sakura-success.show { opacity: 1; }
@keyframes sakuraShake {
  0%,100%{ transform: translateX(0); }
  20%    { transform: translateX(-8px); }
  40%    { transform: translateX(8px); }
  60%    { transform: translateX(-6px); }
  80%    { transform: translateX(6px); }
}
.sakura-shake { animation: sakuraShake .4s ease; }

    #intro {
      position: fixed; inset: 0; z-index: 3000;
      background: radial-gradient(ellipse at 50% 40%, #6b0a2a 0%, #3a0518 45%, #0d0008 100%);
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 8px;
      transition: opacity 1.1s ease;
      overflow: hidden;
    }
    #intro.hide { opacity: 0; pointer-events: none; }

    /* Luxury shimmer overlay */
    #intro::before {
      content: '';
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(192,160,128,0.08) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 50%, rgba(192,160,128,0.08) 0%, transparent 60%);
      pointer-events: none;
    }

    /* Thin silver decorative lines */
    #intro::after {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: min(500px, 90vw); height: min(500px, 90vw);
      border: 1px solid rgba(210,180,160,0.12);
      border-radius: 50%;
      box-shadow:
        0 0 0 30px rgba(210,180,160,0.04),
        0 0 0 60px rgba(210,180,160,0.03),
        0 0 0 100px rgba(210,180,160,0.02);
      pointer-events: none;
    }

    #intro-number {
      position: relative; z-index: 1;
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(8rem, 30vw, 17rem);
      font-weight: 600;
      line-height: 1;
      /* Silver shimmer gradient on text */
      background: linear-gradient(
        160deg,
        #c8a882 0%,
        #e8d5bc 20%,
        #f5ece0 40%,
        #ffffff 50%,
        #f5ece0 60%,
        #e8d5bc 80%,
        #c8a882 100%
      );
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      /* Glow behind the number */
      filter: drop-shadow(0 0 30px rgba(220,180,150,0.9))
              drop-shadow(0 0 60px rgba(180,120,120,0.6))
              drop-shadow(0 0 100px rgba(140,60,80,0.4));
      animation: shimmerPulse 2s ease-in-out infinite;
    }

    @keyframes shimmerPulse {
      0%, 100% {
        filter: drop-shadow(0 0 25px rgba(220,185,155,0.85))
                drop-shadow(0 0 55px rgba(185,120,120,0.55))
                drop-shadow(0 0 90px rgba(140,55,75,0.35));
      }
      50% {
        filter: drop-shadow(0 0 40px rgba(240,200,168,1.0))
                drop-shadow(0 0 80px rgba(210,140,140,0.75))
                drop-shadow(0 0 130px rgba(160,70,90,0.5));
      }
    }

    /* Shimmer sweep animation on the gradient */
    @keyframes shimmerSweep {
      0%   { background-position: -200% center; }
      100% { background-position:  200% center; }
    }

    #intro-word {
      position: relative; z-index: 1;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: clamp(2rem, 8vw, 5.5rem);
      letter-spacing: 8px;
      min-height: 1.2em; text-align: center;
      padding: 0 20px;
      /* Silver text */
      background: linear-gradient(
        135deg,
        #b09878 0%,
        #d4bfa0 25%,
        #f0e0cc 50%,
        #d4bfa0 75%,
        #b09878 100%
      );
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 18px rgba(220,185,155,0.8))
              drop-shadow(0 0 40px rgba(180,110,110,0.45));
      /* Thin silver underline */
      text-decoration: none;
    }

    /* Thin decorative silver line above/below word */
    #intro-line {
      position: relative; z-index: 1;
      width: min(280px, 60vw); height: 1px;
      background: linear-gradient(to right,
        transparent,
        rgba(210,185,158,0.3) 20%,
        rgba(240,215,190,0.8) 50%,
        rgba(210,185,158,0.3) 80%,
        transparent
      );
      margin: 2px 0;
      opacity: 0;
      transition: opacity 0.4s ease;
    }
    #intro-line.show { opacity: 1; }

    .pulse {
      animation: luxuryPulse .7s cubic-bezier(.22,.8,.36,1) forwards;
    }
    @keyframes luxuryPulse {
      0%   { transform: scale(.08); opacity: 0; }
      50%  { transform: scale(1.08); opacity: 1; }
      75%  { transform: scale(0.97); }
      100% { transform: scale(1);    opacity: 1; }
    }

    .fadeWord { animation: luxuryFade .65s ease-out forwards; }
    @keyframes luxuryFade {
      from { opacity: 0; transform: translateY(18px) scale(.92); letter-spacing: 14px; }
      to   { opacity: 1; transform: translateY(0)    scale(1);   letter-spacing: 8px;  }
    }
    .card {
      position: relative; z-index: 10;
      background: rgba(255,240,245,0.96);
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border: 2px solid rgba(244,143,177,0.85);
      border-radius: 28px;
      padding: clamp(22px,5vw,48px) clamp(16px,5vw,50px) clamp(22px,5vw,44px);
      width: 100%; max-width: 560px; text-align: center;
      box-shadow: 0 8px 60px rgba(214,58,110,.20), 0 2px 20px rgba(0,0,0,.12),
                  inset 0 1px 0 rgba(255,255,255,.9);
      opacity: 0; transform: translateY(44px) scale(.97);
      transition: opacity 1s ease, transform 1s ease;
    }
    .card.visible { opacity: 1; transform: translateY(0) scale(1); }
    .petals-top {
      font-size: clamp(1.1rem,3.8vw,1.9rem); letter-spacing: 8px;
      margin-bottom: 10px; display: block;
      animation: petalSway 4s ease-in-out infinite alternate;
    }
    @keyframes petalSway {
      from { transform: rotate(-4deg) scale(1); }
      to   { transform: rotate(4deg) scale(1.05); }
    }
    .hb-word {
      display: inline-block;
      font-family: 'Cormorant Garamond', serif;
      font-weight: 600; color: #d63a6e;
      opacity: 0; transform: translateY(28px);
      transition: opacity .55s ease, transform .55s ease;
    }
    .hb-word.show { opacity: 1; transform: translateY(0); }
    #word-happy, #word-bday { font-size: clamp(1.7rem,6.5vw,3.4rem); }
    #word-to  { font-size: clamp(1.1rem,4.5vw,2.3rem); color: #e91e8c; }
    #word-you { font-size: clamp(1.4rem,5.5vw,2.9rem); font-style: italic; }
    .name {
      font-family: 'Cormorant Garamond', serif; font-style: italic;
      font-size: clamp(1.4rem,5.5vw,2.7rem); color: #c0392b;
      margin: 4px 0 14px;
      opacity: 0; transform: translateY(18px);
      transition: opacity .7s ease, transform .7s ease;
    }
    .name.show { opacity: 1; transform: translateY(0); }
    .divider {
      display: flex; align-items: center; justify-content: center;
      gap: 10px; margin-bottom: 16px;
      opacity: 0; transition: opacity .7s ease;
    }
    .divider.show { opacity: 1; }
    .divider-line { flex:1; max-width:60px; height:1.5px; background:linear-gradient(to right,transparent,#f48fb1,transparent); }
    .divider span { font-size: 1.3rem; }
    .message-box {
      background: rgba(255,255,255,.80); border: 1.5px solid #f8bbd0;
      border-radius: 18px;
      padding: clamp(12px,3.5vw,24px) clamp(12px,3.5vw,26px);
      margin-bottom: 16px; text-align: left; min-height: 90px;
      opacity: 0; transition: opacity .7s ease;
    }
    .message-box.show { opacity: 1; }
    #typed-message {
      font-size: clamp(.80rem,2.5vw,1rem);
      line-height: 1.82; color: #6d1f3e;
      white-space: pre-wrap; font-style: italic;
    }
    .cursor {
      display: inline-block; width: 2px; height: 1.1em;
      background: #d63a6e; margin-left: 2px; vertical-align: text-bottom;
      animation: blink .65s step-end infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }
    .floral-bottom {
      margin-top: 16px; font-size: clamp(.95rem,3.5vw,1.5rem);
      letter-spacing: 6px; opacity: 0; transition: opacity .7s ease;
    }
    .floral-bottom.show { opacity: 1; }
    .balloon {
      position: fixed; font-size: 2rem; pointer-events: none;
      z-index: 998; animation: riseUp linear forwards;
    }
    @keyframes riseUp {
      0%  { transform: translateY(0) rotate(-8deg); opacity: 1; }
      50% { transform: translateY(-50vh) rotate(8deg); }
      100%{ transform: translateY(-105vh) rotate(-4deg); opacity: 0; }
    }
  </style>
</head>
<body>

<!-- SAKURA LOCK SCREEN -->
<div id="sakura-lock">

</div>

<div id="intro">
  <canvas id="intro-particles" style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none;"></canvas>
  <div id="intro-line"></div>
  <div id="intro-number">3</div>
  <div id="intro-line2" class="intro-line2" style="width:min(280px,60vw);height:1px;background:linear-gradient(to right,transparent,rgba(240,215,190,0.7) 50%,transparent);margin:2px 0;opacity:0;transition:opacity 0.4s ease;position:relative;z-index:1;"></div>

      <span class="hb-word" id="word-happy">Happy</span>&nbsp;

  </div>

<script>
/* ══ SAKURA LOCK SCREEN ══ */
(function() {
  const sc  = document.getElementById('sakura-particles');
  const sx  = sc.getContext('2d');
  let active = true;
  function resizeSC(){ sc.width=innerWidth; sc.height=innerHeight; }
  resizeSC(); window.addEventListener('resize', resizeSC);

  // Falling sakura petals
  const petals = Array.from({length: 55}, () => ({
    x:     Math.random() * innerWidth,
    y:     Math.random() * innerHeight,
    r:     2.5 + Math.random() * 4,
    alpha: 0.2 + Math.random() * 0.6,
    vx:    (Math.random() - 0.5) * 0.8,
    vy:    0.4 + Math.random() * 1.0,
    spin:  Math.random() * Math.PI * 2,
    spinV: (Math.random() - 0.5) * 0.06,
    color: `hsl(${Math.round(340+Math.random()*30)},${Math.round(70+Math.random()*25)}%,${Math.round(75+Math.random()*20)}%)`,
  }));

  // Floating pink glow particles
  const glows = Array.from({length: 30}, () => ({
    x: Math.random(), y: Math.random(),
    r: 0.8 + Math.random() * 2.2,
    alpha: 0.15 + Math.random() * 0.5,
    phase: Math.random() * Math.PI * 2,
    speed: 0.012 + Math.random() * 0.025,
    vx: (Math.random()-0.5)*0.0008, vy: (Math.random()-0.5)*0.0006,
  }));

  (function drawSakura() {
    if (!active) return;
    sx.clearRect(0, 0, sc.width, sc.height);

    // Falling petals
    petals.forEach(p => {
      p.x += p.vx + Math.sin(p.spin * 0.3) * 0.4;
      p.y += p.vy;
      p.spin += p.spinV;
      if (p.y > sc.height + 10) { p.y = -10; p.x = Math.random() * sc.width; }
      sx.save();
      sx.globalAlpha = p.alpha;
      sx.translate(p.x, p.y);
      sx.rotate(p.spin);
      // Draw petal shape
      sx.fillStyle = p.color;
      sx.shadowColor = p.color;
      sx.shadowBlur = 8;
      sx.beginPath();
      sx.ellipse(0, 0, p.r, p.r * 1.6, 0, 0, Math.PI * 2);
      sx.fill();
      sx.restore();
    });

    // Glowing dots
    glows.forEach(g => {
      g.phase += g.speed;
      g.x += g.vx; g.y += g.vy;
      if (g.x < 0) g.x = 1; if (g.x > 1) g.x = 0;
      if (g.y < 0) g.y = 1; if (g.y > 1) g.y = 0;
      const a = g.alpha * (0.3 + Math.abs(Math.sin(g.phase)) * 0.7);
      sx.save();
      sx.globalAlpha = a;
      sx.fillStyle = '#ffb3d1';
      sx.shadowColor = '#ff80ab';
      sx.shadowBlur = 10;
      sx.beginPath();
      sx.arc(g.x * sc.width, g.y * sc.height, g.r, 0, Math.PI * 2);
      sx.fill();
      sx.restore();
    });

    requestAnimationFrame(drawSakura);
  })();

  // Stop when hidden
  const obs = new MutationObserver(() => {
    if (document.getElementById('sakura-lock').classList.contains('hide')) {
      active = false;
    }
  });
  obs.observe(document.getElementById('sakura-lock'), { attributes: true });
})();

/* ══ SAKURA PASSWORD ══ */
const SAKURA_PASSWORD = 'Nanook';
const sakuraInput = document.getElementById('sakura-input');
const sakuraBtn   = document.getElementById('sakura-btn');
const sakuraErr   = document.getElementById('sakura-error');
const sakuraSucc  = document.getElementById('sakura-success');
const sakuraWrap  = document.getElementById('sakura-input-wrap');

function trySakuraUnlock() {
  const val = sakuraInput.value.trim();
  if (val.toLowerCase() === SAKURA_PASSWORD.toLowerCase()) {
    sakuraErr.classList.remove('show');
    sakuraInput.style.borderColor = 'rgba(255,150,180,0.9)';
    sakuraInput.style.boxShadow   = '0 0 30px rgba(255,100,150,0.5)';
    sakuraBtn.disabled = true;
    document.getElementById('sakura-lock-icon').textContent = '🔓';
    sakuraSucc.classList.add('show');
    setTimeout(() => {
      document.getElementById('sakura-lock').classList.add('hide');
      setTimeout(() => {
        document.getElementById('sakura-lock').style.display = 'none';
      }, 1300);
    }, 900);
  } else {
    sakuraErr.classList.remove('show');
    void sakuraErr.offsetWidth;
    sakuraErr.classList.add('show');
    sakuraWrap.classList.remove('sakura-shake');
    void sakuraWrap.offsetWidth;
    sakuraWrap.classList.add('sakura-shake');
    sakuraInput.value = '';
    setTimeout(() => sakuraErr.classList.remove('show'), 2500);
  }
}
sakuraBtn.addEventListener('click', trySakuraUnlock);
sakuraInput.addEventListener('keydown', e => { if (e.key === 'Enter') trySakuraUnlock(); });
setTimeout(() => sakuraInput.focus(), 400);

/* ══ INTRO SILVER SHIMMER PARTICLES ══ */
(function() {
  const ipc  = document.getElementById('intro-particles');
  const ipx  = ipc.getContext('2d');
  let active = true;

  function resizeIPC() { ipc.width = innerWidth; ipc.height = innerHeight; }
  resizeIPC(); window.addEventListener('resize', resizeIPC);

  // Silver/rose floating particles
  const sparks = Array.from({length: 90}, () => ({
    x:     Math.random() * innerWidth,
    y:     Math.random() * innerHeight,
    r:     0.4 + Math.random() * 1.8,
    alpha: 0.1 + Math.random() * 0.7,
    vx:    (Math.random() - 0.5) * 0.3,
    vy:    -(0.2 + Math.random() * 0.5),
    twinkle: Math.random() * Math.PI * 2,
    color: Math.random() < 0.6
      ? `hsl(${20 + Math.random()*20}, 40%, ${75 + Math.random()*20}%)`  // silver-gold
      : `hsl(${330 + Math.random()*20}, 60%, ${70 + Math.random()*20}%)` // rose-silver
  }));

  (function drawIPC() {
    if (!active) return;
    ipx.clearRect(0, 0, ipc.width, ipc.height);
    sparks.forEach(s => {
      s.twinkle += 0.04;
      s.x += s.vx; s.y += s.vy;
      if (s.y < -5) { s.y = ipc.height + 5; s.x = Math.random() * ipc.width; }
      const a = s.alpha * (0.5 + Math.abs(Math.sin(s.twinkle)) * 0.5);
      ipx.save();
      ipx.globalAlpha = a;
      ipx.fillStyle   = s.color;
      ipx.shadowColor = s.color;
      ipx.shadowBlur  = 8;
      ipx.beginPath();
      ipx.arc(s.x, s.y, s.r * (0.6 + Math.abs(Math.sin(s.twinkle)) * 0.8), 0, Math.PI*2);
      ipx.fill();
      ipx.restore();
    });
    requestAnimationFrame(drawIPC);
  })();

  // Stop particles once intro hides
  const obs = new MutationObserver(() => {
    if (document.getElementById('intro').classList.contains('hide')) {
      active = false; ipx.clearRect(0, 0, ipc.width, ipc.height);
    }
  });
  obs.observe(document.getElementById('intro'), { attributes: true });
})();

/* ══════════════════════════════════════════════
   ROSE BLOOM — closed bud, tap to bloom open
   Rose grows from bud → full bloom → card reveals
══════════════════════════════════════════════ */
function showRoseBloom(onDone) {
  const wrap = document.createElement('div');
  wrap.style.cssText = `
    position:fixed;top:0;left:0;width:100%;height:100%;
    z-index:5000;background:#000;cursor:pointer;
    opacity:0;transition:opacity .8s ease;
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;
  `;

  const isMob = window.innerWidth < 600;
  const EW = isMob ? 220 : 300;  // envelope width
  const EH = EW * 0.65;          // envelope height

  // Canvas for envelope
  const ec = document.createElement('canvas');
  ec.width  = EW; ec.height = EH;
  ec.style.cssText = `display:block;cursor:pointer;`;
  wrap.appendChild(ec);
  const ex = ec.getContext('2d');

  // Prompt text
  const label = document.createElement('div');
  label.style.cssText = `
    margin-top:clamp(16px,3vh,24px);
    font-family:'Cormorant Garamond',serif; font-style:italic;
    font-size:clamp(14px,3.5vw,20px);
    color:rgba(255,180,210,0.9); letter-spacing:2px;
    text-align:center; text-shadow:0 0 14px rgba(255,120,160,0.6);
  `;

  const hint = document.createElement('div');
  hint.style.cssText = `
    margin-top:8px;
    font-family:'Cormorant Garamond',serif; font-style:italic;
    font-size:clamp(11px,2.5vw,14px);
    color:rgba(255,150,180,0.45); letter-spacing:2px;
    text-align:center; opacity:0; transition:opacity .8s ease;
  `;
  hint.textContent = '— tap to open —';
  wrap.appendChild(label);
  wrap.appendChild(hint);

  // Falling sakura petals background
  const bg = document.createElement('canvas');
  bg.style.cssText='position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;';
  bg.width=window.innerWidth; bg.height=window.innerHeight;
  wrap.insertBefore(bg, ec.parentNode ? null : ec);
  wrap.insertBefore(bg, wrap.firstChild);
  ec.style.position='relative'; ec.style.zIndex='1';
  label.style.position='relative'; label.style.zIndex='1';
  hint.style.position='relative'; hint.style.zIndex='1';
  const bx = bg.getContext('2d');
  const bgPetals = Array.from({length:40},()=>({
    x:Math.random()*window.innerWidth, y:Math.random()*window.innerHeight,
    r:2+Math.random()*3, vx:(Math.random()-.5)*.6, vy:.3+Math.random()*.8,
    spin:Math.random()*Math.PI*2, spinV:(Math.random()-.5)*.05,
    alpha:.15+Math.random()*.4,
    color:`hsl(${Math.round(335+Math.random()*30)},${Math.round(70+Math.random()*20)}%,${Math.round(75+Math.random()*18)}%)`
  }));

  document.body.appendChild(wrap);
  requestAnimationFrame(()=>requestAnimationFrame(()=>{ wrap.style.opacity='1'; }));

  // ── ENVELOPE STATE ──
  let phase     = 'idle';   // idle → open → done
  let lidAngle  = 0;        // 0=closed, 1=fully open (0..1)
  let lidDir    = 0;
  let doneCalled= false;
  let shimmer   = 0;

  // Type label
  const PROMPT  = 'A message for you...';
  let pi = 0;
  function typeLabel(){
    if(pi<PROMPT.length){ label.textContent+=PROMPT[pi++]; setTimeout(typeLabel,65); }
    else setTimeout(()=>{ hint.style.opacity='1'; },400);
  }
  setTimeout(typeLabel, 500);

  function drawEnvelope(t) {
    ex.clearRect(0,0,EW,EH);
    const W=EW, H=EH;
    const r=10; // corner radius

    // ── ENVELOPE BODY ──
    ex.save();
    const bodyG=ex.createLinearGradient(0,0,W,H);
    bodyG.addColorStop(0,'#2d0018');
    bodyG.addColorStop(0.5,'#5a0030');
    bodyG.addColorStop(1,'#2d0018');
    ex.fillStyle=bodyG;
    ex.shadowColor='rgba(255,100,150,0.5)'; ex.shadowBlur=20;
    ex.beginPath();
    ex.moveTo(r,0); ex.lineTo(W-r,0); ex.quadraticCurveTo(W,0,W,r);
    ex.lineTo(W,H-r); ex.quadraticCurveTo(W,H,W-r,H);
    ex.lineTo(r,H); ex.quadraticCurveTo(0,H,0,H-r);
    ex.lineTo(0,r); ex.quadraticCurveTo(0,0,r,0);
    ex.closePath(); ex.fill();
    // Border
    ex.strokeStyle='rgba(255,150,180,0.45)'; ex.lineWidth=1.5; ex.stroke();
    ex.restore();

    // ── ENVELOPE INNER DIAGONAL LINES (bottom V) ──
    ex.save();
    ex.globalAlpha=0.35;
    ex.strokeStyle='rgba(255,150,180,0.5)'; ex.lineWidth=1;
    // Left diagonal
    ex.beginPath(); ex.moveTo(0,0); ex.lineTo(W/2,H*.6); ex.stroke();
    // Right diagonal
    ex.beginPath(); ex.moveTo(W,0); ex.lineTo(W/2,H*.6); ex.stroke();
    // Bottom left
    ex.beginPath(); ex.moveTo(0,H); ex.lineTo(W/2,H*.6); ex.stroke();
    // Bottom right
    ex.beginPath(); ex.moveTo(W,H); ex.lineTo(W/2,H*.6); ex.stroke();
    ex.restore();

    // ── WAX SEAL ──
    if(lidAngle<0.3){
      const sealX=W/2, sealY=H*.55;
      ex.save();
      const sealG=ex.createRadialGradient(sealX-4,sealY-4,0,sealX,sealY,18);
      sealG.addColorStop(0,'#ff80ab'); sealG.addColorStop(0.5,'#c2185b'); sealG.addColorStop(1,'#880033');
      ex.fillStyle=sealG; ex.shadowColor='#ff80ab'; ex.shadowBlur=15;
      ex.beginPath(); ex.arc(sealX,sealY,14*(1-lidAngle*3),0,Math.PI*2); ex.fill();
      // Seal letter C
      ex.globalAlpha=1-lidAngle*3;
      ex.fillStyle='rgba(255,220,230,0.9)'; ex.shadowBlur=0;
      ex.font=`bold ${isMob?10:13}px Georgia,serif`;
      ex.textAlign='center'; ex.textBaseline='middle';
      ex.fillText('C',sealX,sealY);
      ex.restore();
    }

    // ── SHIMMERING RIBBON ──
    shimmer=(shimmer+0.04)%1;
    const ribW=W*.08;
    ex.save();
    const ribG=ex.createLinearGradient(W/2-ribW/2,0,W/2+ribW/2,0);
    ribG.addColorStop(0,'rgba(255,100,150,0.3)');
    ribG.addColorStop(0.4,'rgba(255,200,220,0.9)');
    ribG.addColorStop(0.6,'rgba(255,200,220,0.9)');
    ribG.addColorStop(1,'rgba(255,100,150,0.3)');
    ex.fillStyle=ribG; ex.shadowColor='#ffb3d1'; ex.shadowBlur=8;
    ex.fillRect(W/2-ribW/2,0,ribW,H);
    ex.restore();

    // ── LID — flips open ──
    ex.save();
    ex.translate(W/2, 0);
    // Perspective flip: scaleY goes 1→0→-1 as lid opens
    const scaleY = Math.cos(lidAngle * Math.PI);
    ex.scale(1, scaleY);
    // Lid triangle
    const lidG=ex.createLinearGradient(-W/2,0,W/2,H*.55);
    lidG.addColorStop(0,'#3d0022'); lidG.addColorStop(0.5,'#6a0035'); lidG.addColorStop(1,'#3d0022');
    ex.fillStyle=lidG;
    ex.shadowColor='rgba(255,100,150,0.4)'; ex.shadowBlur=10;
    ex.beginPath(); ex.moveTo(-W/2,0); ex.lineTo(0,H*.55); ex.lineTo(W/2,0); ex.closePath(); ex.fill();
    ex.strokeStyle='rgba(255,150,180,0.4)'; ex.lineWidth=1; ex.stroke();
    // Lid ribbon continuation
    ex.fillStyle=ribG; ex.shadowColor='#ffb3d1'; ex.shadowBlur=8;
    ex.fillRect(-ribW/2,0,ribW,H*.55);
    ex.restore();

    // ── SPARKLES when opening ──
    if(phase==='open' && lidAngle>0.3){
      const sp=(lidAngle-.3)/.7;
      for(let s=0;s<6;s++){
        const sa=(s/6)*Math.PI*2+t*2;
        const sr=W*.3*sp;
        ex.save();
        ex.globalAlpha=sp*(0.5+Math.abs(Math.sin(t*3+s))*.5);
        ex.fillStyle='#ffd700'; ex.shadowColor='#ffd700'; ex.shadowBlur=8;
        ex.font=`${isMob?9:11}px serif`; ex.textAlign='center';
        ex.fillText('✦',W/2+Math.cos(sa)*sr,H/2+Math.sin(sa)*sr*.6);
        ex.restore();
      }
    }

    // ── GLOW PULSE when idle ──
    const pulse=0.5+Math.abs(Math.sin(t*1.8))*.5;
    ex.save();
    ex.globalAlpha=pulse*0.3;
    ex.strokeStyle='rgba(255,150,180,0.6)'; ex.lineWidth=2;
    ex.shadowColor='#ff80ab'; ex.shadowBlur=15;
    ex.beginPath();
    ex.moveTo(r,0); ex.lineTo(W-r,0); ex.quadraticCurveTo(W,0,W,r);
    ex.lineTo(W,H-r); ex.quadraticCurveTo(W,H,W-r,H);
    ex.lineTo(r,H); ex.quadraticCurveTo(0,H,0,H-r);
    ex.lineTo(0,r); ex.quadraticCurveTo(0,0,r,0);
    ex.closePath(); ex.stroke();
    ex.restore();
  }

  let rafId;
  function loop(){
    const t=performance.now()/1000;

    // Bg petals
    bx.clearRect(0,0,bg.width,bg.height);
    bgPetals.forEach(p=>{
      p.x+=p.vx+Math.sin(p.spin*.3)*.3; p.y+=p.vy; p.spin+=p.spinV;
      if(p.y>bg.height+10){p.y=-10;p.x=Math.random()*bg.width;}
      bx.save(); bx.globalAlpha=p.alpha; bx.translate(p.x,p.y); bx.rotate(p.spin);
      bx.fillStyle=p.color; bx.shadowColor=p.color; bx.shadowBlur=5;
      bx.beginPath(); bx.ellipse(0,0,p.r,p.r*1.6,0,0,Math.PI*2); bx.fill(); bx.restore();
    });

    // Envelope open animation
    if(phase==='open'){
      lidAngle=Math.min(lidAngle+0.025,1);
      if(lidAngle>=1 && !doneCalled){
        doneCalled=true;
        setTimeout(()=>{
          let a=1;
          const fi=setInterval(()=>{
            a-=.03; wrap.style.opacity=Math.max(0,a);
            if(a<=0){clearInterval(fi);wrap.remove();onDone();}
          },20);
        },600);
      }
    }

    drawEnvelope(t);
    rafId=requestAnimationFrame(loop);
  }
  loop();

  function handleTap(){
    if(phase!=='idle') return;
    phase='open'; lidAngle=0;
    label.style.opacity='0'; hint.style.opacity='0';
  }
  ec.addEventListener('click', handleTap);
  wrap.addEventListener('click', handleTap);
  wrap.addEventListener('touchstart',e=>{e.preventDefault();handleTap();},{passive:false});
}

/* ══════════════════════════════════════════════
   SAKURA CATCHING GAME
   Petals fall from top — tap 5 to catch them
══════════════════════════════════════════════ */
function showSakuraGame(onDone) {
  const wrap = document.createElement('div');
  wrap.style.cssText = `
    position:fixed;inset:0;z-index:6000;
    background:radial-gradient(ellipse at 50% 30%,#1a0010 0%,#0d0008 60%,#000 100%);
    overflow:hidden; opacity:0; transition:opacity .8s ease;
  `;

  const gc = document.createElement('canvas');
  gc.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;';
  wrap.appendChild(gc);

  function resizeGC() {
    gc.width  = document.documentElement.clientWidth;
    gc.height = document.documentElement.clientHeight;
  }
  resizeGC();
  const _gcResize = () => resizeGC();
  window.addEventListener('resize', _gcResize);

  // Score display
  const scoreEl = document.createElement('div');
  scoreEl.style.cssText = `
    position:absolute; top:clamp(16px,4vh,28px); left:50%;
    transform:translateX(-50%);
    font-family:'Cormorant Garamond',serif; font-style:italic;
    font-size:clamp(20px,5vw,28px); color:#ffb3d1;
    letter-spacing:3px; text-align:center;
    text-shadow:0 0 16px rgba(255,120,160,0.7);
    pointer-events:none; z-index:2;
    background:rgba(0,0,0,0.45);
    padding:6px 20px; border-radius:20px;
    backdrop-filter:blur(4px);
  `;
  wrap.appendChild(scoreEl);

  // Instruction
  const instrEl = document.createElement('div');
  instrEl.style.cssText = `
    position:absolute; top:clamp(58px,12vh,80px); left:50%;
    transform:translateX(-50%);
    font-family:'Cormorant Garamond',serif; font-style:italic;
    font-size:clamp(12px,3vw,15px); color:rgba(255,180,210,0.7);
    letter-spacing:2px; text-align:center; white-space:nowrap;
    pointer-events:none; z-index:2;
    background:rgba(0,0,0,0.35);
    padding:4px 14px; border-radius:14px;
  `;
  instrEl.textContent = '— tap the sakura petals —';
  wrap.appendChild(instrEl);

  document.body.appendChild(wrap);
  requestAnimationFrame(()=>requestAnimationFrame(()=>{ wrap.style.opacity='1'; }));

  const gx = gc.getContext('2d');
  const isMob = document.documentElement.clientWidth < 600;
  let caught   = 0;
  const NEED   = 5;
  let gameDone = false;

  // Sakura petals falling
  const petals = [];
  function spawnPetal() {
    const size  = isMob ? 20+Math.random()*16 : 26+Math.random()*20;
    const safeY = isMob ? 110 : 90;  // below the score/instruction text
    petals.push({
      x:      20 + Math.random()*(innerWidth-40),
      y:      -size,
      vy:     3.5 + Math.random()*3.0,
      vx:     (Math.random()-.5)*.8,
      spin:   Math.random()*Math.PI*2,
      spinV:  (Math.random()-.5)*.04,
      size,
      alpha:  .85+Math.random()*.15,
      caught: false,
      popT:   0,
      safeY,  // petals visually pass through but collision only below safeY
      color:  `hsl(${Math.round(335+Math.random()*25)},${Math.round(75+Math.random()*20)}%,${Math.round(78+Math.random()*15)}%)`,
    });
  }

  // Spawn initial petals staggered
  for(let i=0;i<6;i++) setTimeout(()=>spawnPetal(), i*400);
  // Keep spawning
  const spawnInt = setInterval(()=>{ if(!gameDone) spawnPetal(); }, 900);

  function updateScore() {
    scoreEl.textContent = `🌸 ${caught} / ${NEED}`;
  }
  updateScore();

  // Draw realistic sakura flower
  function drawPetal(ctx, x, y, size, spin, alpha, color, pop) {
    ctx.save();
    ctx.globalAlpha = alpha * (pop > 0 ? Math.max(0, 1-pop*3) : 1);
    ctx.translate(x, y);
    ctx.rotate(spin);
    const sc = pop > 0 ? 1+pop*2 : 1;
    ctx.scale(sc, sc);

    for(let p=0;p<5;p++){
      const a = (p/5)*Math.PI*2;
      ctx.save();
      ctx.rotate(a);
      // Realistic heart-shaped petal with notch at tip
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.bezierCurveTo(-size*.38, -size*.2,  -size*.42, -size*.75, 0,       -size*.85);
      ctx.bezierCurveTo( size*.42, -size*.75,  size*.38,  -size*.2,  0,        0);
      const pg = ctx.createLinearGradient(0, 0, 0, -size*.85);
      pg.addColorStop(0,   '#fff0f5');
      pg.addColorStop(0.3, color);
      pg.addColorStop(1,   color);
      ctx.fillStyle = pg;
      ctx.shadowColor = color; ctx.shadowBlur = 8;
      ctx.fill();
      // Petal vein
      ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(0,-size*.75);
      ctx.strokeStyle='rgba(255,255,255,0.3)'; ctx.lineWidth=0.8; ctx.stroke();
      // Notch at tip
      ctx.beginPath();
      ctx.arc(0, -size*.85, size*.08, 0, Math.PI*2);
      ctx.fillStyle='rgba(255,150,180,0.5)'; ctx.shadowBlur=0; ctx.fill();
      ctx.restore();
    }
    // Stamens — small yellow dots
    for(let s=0;s<6;s++){
      const sa=(s/6)*Math.PI*2;
      ctx.save();
      ctx.fillStyle='#fff176'; ctx.shadowColor='#ffd700'; ctx.shadowBlur=4;
      ctx.beginPath();
      ctx.arc(Math.cos(sa)*size*.18, Math.sin(sa)*size*.18, size*.05, 0, Math.PI*2);
      ctx.fill(); ctx.restore();
    }
    // Pink center
    ctx.fillStyle='#ffb3c8'; ctx.shadowColor='#ff80ab'; ctx.shadowBlur=6;
    ctx.beginPath(); ctx.arc(0,0,size*.1,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }

  // Catch particles burst
  const bursts = [];
  function addBurst(x, y, color) {
    for(let i=0;i<10;i++) bursts.push({
      x, y, vx:(Math.random()-.5)*6, vy:-(1+Math.random()*4),
      alpha:1, r:2+Math.random()*3, color,
    });
  }

  let rafId;
  function gameLoop() {
    gx.clearRect(0,0,gc.width,gc.height);

    // Update & draw petals
    for(let i=petals.length-1;i>=0;i--){
      const p = petals[i];
      if(p.caught){
        p.popT += 0.08;
        if(p.popT > 0.4){ petals.splice(i,1); continue; }
      } else {
        p.x += p.vx + Math.sin(p.spin*.4)*.5;
        p.y += p.vy;
        p.spin += p.spinV;
        if(p.y > gc.height+p.size){ petals.splice(i,1); continue; }
      }
      // Fade petals in the text safe zone at top
      const safeZone = p.safeY || 110;
      const fadeAlpha = p.y < safeZone
        ? p.alpha * Math.max(0, p.y / safeZone)
        : p.alpha;
      drawPetal(gx, p.x, p.y, p.size, p.spin, fadeAlpha, p.color, p.popT);
    }

    // Burst particles
    for(let i=bursts.length-1;i>=0;i--){
      const b = bursts[i];
      b.x+=b.vx; b.y+=b.vy; b.vy+=.15; b.alpha-=.04;
      if(b.alpha<=0){bursts.splice(i,1);continue;}
      gx.save(); gx.globalAlpha=b.alpha; gx.fillStyle=b.color;
      gx.shadowColor=b.color; gx.shadowBlur=6;
      gx.beginPath(); gx.arc(b.x,b.y,b.r,0,Math.PI*2); gx.fill(); gx.restore();
    }

    if(!gameDone) rafId = requestAnimationFrame(gameLoop);
  }
  gameLoop();

  // Tap to catch
  function handleTap(e) {
    if(gameDone) return;
    const points = e.changedTouches
      ? Array.from(e.changedTouches)
      : [{ clientX: e.clientX, clientY: e.clientY }];
    points.forEach(touch => {
      const tapX = touch.clientX, tapY = touch.clientY;
      for(let i=petals.length-1;i>=0;i--){
        const p = petals[i];
        if(p.caught) continue;
        const dx=tapX-p.x, dy=tapY-p.y;
        if(Math.sqrt(dx*dx+dy*dy) < p.size*1.4){
          p.caught=true; p.popT=0;
          addBurst(p.x, p.y, p.color);
          caught++;
          updateScore();
          if(caught >= NEED){
            gameDone=true;
            clearInterval(spawnInt);
            cancelAnimationFrame(rafId);
            scoreEl.textContent = '🌸 5 / 5  ✨';
            scoreEl.style.color = '#ffd700';
            scoreEl.style.textShadow = '0 0 20px rgba(255,215,0,0.9)';
            instrEl.textContent = 'You caught them all! 🌸';
            instrEl.style.color = 'rgba(255,215,0,0.75)';
            // Short 600ms pause to show success, then instant transition
            setTimeout(()=>{ window.removeEventListener('resize',_gcResize); wrap.remove(); onDone(); }, 600);
          }
          break;
        }
      }
    });
  }
  wrap.addEventListener('click', handleTap);
  wrap.addEventListener('touchstart', e=>{e.preventDefault();handleTap(e);},{passive:false});
}

/* ══════════════════════════════════════════════
   SAKURA TREE — full tree blooms on screen
   Branches drawn first, then flowers bloom on each
══════════════════════════════════════════════ */
function showSakuraTree(onDone) {
  const wrap = document.createElement('div');
  wrap.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;z-index:6000;background:#000;overflow:hidden;';
  document.body.appendChild(wrap);

  const cv = document.createElement('canvas');
  const W  = window.innerWidth;
  const H  = window.innerHeight;
  cv.width = W; cv.height = H;
  cv.style.cssText = 'position:absolute;top:0;left:0;';
  wrap.appendChild(cv);
  const ctx = cv.getContext('2d');
  const isMob = W < 600;
  const CX = W / 2;

  const COLS = ['#ffb3d1','#f48fb1','#fce4ec','#ff80ab','#f06292','#fff0f5','#ffcdd2'];
  const moonR = Math.min(W, H) * (isMob ? 0.28 : 0.24);

  // Sakura petals — lots of them raining
  const petals = Array.from({length: isMob?80:120}, () => ({
    x:     Math.random() * W,
    y:     -20 - Math.random() * H,
    vx:    (Math.random()-.5) * 1.2,
    vy:    0.6 + Math.random() * 1.4,
    spin:  Math.random() * Math.PI * 2,
    spinV: (Math.random()-.5) * 0.05,
    size:  isMob ? 5+Math.random()*7 : 7+Math.random()*9,
    alpha: 0.4 + Math.random() * 0.6,
    color: COLS[Math.floor(Math.random()*COLS.length)],
    sway:  Math.random() * Math.PI * 2,
    swayS: 0.015 + Math.random() * 0.02,
  }));

  // Moon silhouette branch shapes (simple curved lines)
  function drawMoonBranch(ctx, x, y, a, len, dep) {
    if (dep > 3 || len < 6) return;
    const ex = x + Math.cos(a)*len, ey = y + Math.sin(a)*len;
    ctx.save();
    ctx.strokeStyle = `rgba(20,5,15,${0.7-dep*0.15})`;
    ctx.lineWidth   = Math.max(0.8, 3.5 - dep*0.9);
    ctx.lineCap     = 'round';
    ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(ex,ey); ctx.stroke();
    ctx.restore();
    if (dep < 3) {
      drawMoonBranch(ctx, ex, ey, a-0.4+(Math.random()-.5)*.15, len*0.65, dep+1);
      drawMoonBranch(ctx, ex, ey, a+0.35+(Math.random()-.5)*.15, len*0.60, dep+1);
    }
  }

  function drawSakura(x, y, size, spin, alpha, color) {
    if (alpha<=0) return;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.translate(x, y); ctx.rotate(spin);
    for (let p=0;p<5;p++) {
      const a=(p/5)*Math.PI*2;
      ctx.save(); ctx.rotate(a);
      ctx.beginPath();
      ctx.moveTo(0,0);
      ctx.bezierCurveTo(-size*.32,-size*.15,-size*.35,-size*.68,0,-size*.78);
      ctx.bezierCurveTo(size*.35,-size*.68,size*.32,-size*.15,0,0);
      const pg=ctx.createLinearGradient(0,0,0,-size*.78);
      pg.addColorStop(0,'#fff8fa'); pg.addColorStop(0.5,color); pg.addColorStop(1,color);
      ctx.fillStyle=pg; ctx.shadowColor=color; ctx.shadowBlur=4;
      ctx.fill(); ctx.restore();
    }
    ctx.fillStyle='#fff9e6'; ctx.shadowColor='#ffd700'; ctx.shadowBlur=4;
    ctx.beginPath(); ctx.arc(0,0,size*.1,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }

  // Phase state
  let time    = 0;
  let moonY   = H + moonR*1.5;
  let moonTargY = H * (isMob ? 0.38 : 0.40);
  let wrapA   = 0;
  let fadeA   = 1;
  let phase   = 'rise';   // rise → type → fade
  let holdT   = 0;

  // Typing message state
  const LINE2A = 'Like the moon, you light up';
  const LINE2B = 'every room you enter 🌸';
  let typed2a = '', typed2b = '';
  let t2ai = 0, t2bi = 0;
  let msgA    = 0;
  let typingDone = false;

  function startTyping() {
    msgA = 0;
    // Fade in text container first
    let fa = 0;
    const fi = setInterval(()=>{ fa=Math.min(fa+0.05,1); msgA=fa; if(fa>=1) clearInterval(fi); },20);
    // Type line 1
    function typeLine2() {
      if (t2ai < LINE2A.length) { typed2a += LINE2A[t2ai++]; setTimeout(typeLine2, 18); }
      else if (t2bi < LINE2B.length) { typed2b += LINE2B[t2bi++]; setTimeout(typeLine2, 18); }
      else { typingDone = true; setTimeout(()=>{ phase='fade'; }, 1500); }
    }
    setTimeout(typeLine2, 300);
  }

  function loop() {
    time += 0.016;

    // Background
    ctx.fillStyle = '#000';
    ctx.fillRect(0,0,W,H);
    const sky = ctx.createLinearGradient(0,0,0,H);
    sky.addColorStop(0,'#000008'); sky.addColorStop(0.4,'#0a0015'); sky.addColorStop(1,'#1a0020');
    ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);

    // Stars
    ctx.save();
    for (let s=0;s<60;s++) {
      const sx=((s*137.5)%W), sy=((s*93.7)%(H*0.65));
      const sa=0.3+Math.abs(Math.sin(time*0.8+s))*0.5;
      ctx.globalAlpha=sa*Math.min(1,wrapA*2);
      ctx.fillStyle='#fff8ff';
      ctx.beginPath(); ctx.arc(sx,sy,0.5+(s%3)*0.4,0,Math.PI*2); ctx.fill();
    }
    ctx.restore();

    // ── MOON RISE — fast ──
    if (phase==='rise') {
      moonY -= (isMob ? 3.5 : 4.5);  // fast rise
      if (moonY <= moonTargY) {
        moonY = moonTargY;
        phase = 'type';
        startTyping();
      }
    }

    // Moon glow
    const mg1=ctx.createRadialGradient(CX,moonY,moonR*0.7,CX,moonY,moonR*3.2);
    mg1.addColorStop(0,'rgba(255,220,200,0.22)'); mg1.addColorStop(0.3,'rgba(255,180,160,0.10)');
    mg1.addColorStop(0.7,'rgba(200,100,120,0.04)'); mg1.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=mg1; ctx.beginPath(); ctx.arc(CX,moonY,moonR*3.2,0,Math.PI*2); ctx.fill();

    const mg2=ctx.createRadialGradient(CX,moonY,moonR*0.5,CX,moonY,moonR*1.6);
    mg2.addColorStop(0,'rgba(255,240,220,0.35)'); mg2.addColorStop(0.5,'rgba(255,200,180,0.12)');
    mg2.addColorStop(1,'rgba(255,160,140,0)');
    ctx.fillStyle=mg2; ctx.beginPath(); ctx.arc(CX,moonY,moonR*1.6,0,Math.PI*2); ctx.fill();

    // Moon body
    const mb=ctx.createRadialGradient(CX-moonR*.22,moonY-moonR*.22,moonR*.05,CX,moonY,moonR);
    mb.addColorStop(0,'#fffef0'); mb.addColorStop(0.3,'#fff8e8');
    mb.addColorStop(0.7,'#f5e8d0'); mb.addColorStop(1,'#e8d0b8');
    ctx.save();
    ctx.shadowColor='rgba(255,220,180,0.8)'; ctx.shadowBlur=moonR*0.3;
    ctx.fillStyle=mb; ctx.beginPath(); ctx.arc(CX,moonY,moonR,0,Math.PI*2); ctx.fill();
    ctx.restore();

    // Craters
    [[-.3,-.25,.12],[.2,.1,.07],[-.1,.3,.09],[.35,-.15,.06]].forEach(([cx2,cy2,cr])=>{
      ctx.save(); ctx.globalAlpha=0.06; ctx.fillStyle='#c0a080';
      ctx.beginPath(); ctx.arc(CX+cx2*moonR,moonY+cy2*moonR,cr*moonR,0,Math.PI*2); ctx.fill(); ctx.restore();
    });

    // ── PETALS ──
    petals.forEach(p=>{
      p.sway+=p.swayS; p.x+=p.vx+Math.sin(p.sway)*0.6; p.y+=p.vy; p.spin+=p.spinV;
      if(p.y>H+20){p.y=-20;p.x=Math.random()*W;}
      const dMoon=Math.sqrt((p.x-CX)**2+(p.y-moonY)**2);
      const nearGlow=dMoon<moonR*2?(1-(dMoon/(moonR*2)))*0.4:0;
      drawSakura(p.x,p.y,p.size,p.spin,p.alpha*Math.min(1,wrapA*2)+nearGlow*p.alpha,p.color);
    });

    // ── TYPING MESSAGE ──
    if ((phase==='type'||phase==='fade') && msgA>0) {
      const fs2 = isMob ? 16 : 22;
      const lineH = isMob ? 28 : 36;
      const msgY = moonY + moonR + (isMob ? 32 : 44);
      ctx.save();
      ctx.globalAlpha  = msgA * (phase==='fade' ? fadeA : 1);
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'middle';
      ctx.font = `italic ${fs2}px 'Cormorant Garamond',serif`;
      ctx.fillStyle = 'rgba(255,200,220,0.95)';
      ctx.shadowColor = '#ff80ab'; ctx.shadowBlur = 16;
      // Line A
      const cursorA = t2ai < LINE2A.length ? '|' : '';
      ctx.fillText(typed2a + cursorA, CX, msgY);
      // Line B — only show once line A is done
      if (t2ai >= LINE2A.length) {
        const cursorB = t2bi < LINE2B.length ? '|' : '';
        ctx.fillText(typed2b + cursorB, CX, msgY + lineH);
      }
      ctx.restore();
    }

    // ── FADE — moon + petals + message all together ──
    if (phase==='fade') {
      fadeA=Math.max(0,fadeA-0.045);  // fast fade
      wrap.style.opacity=fadeA;
      if(fadeA<=0){wrap.remove();onDone();return;}
    }

    // Fade wrap in
    if (wrapA<1){wrapA=Math.min(wrapA+0.05,1); if(phase!=='fade') wrap.style.opacity=wrapA;}

    requestAnimationFrame(loop);
  }
  loop();
}

/* ══════════════════════════════════════════════
   BIRTHDAY CAKE — drawn with canvas 2D API
   Beautiful 3-tier cake with candles, frosting,
   decorations, and animated flame flicker
══════════════════════════════════════════════ */
function drawCake() {
  const cv  = document.getElementById('cakeCanvas');
  const isMob = window.innerWidth < 600;
  const W   = isMob ? 140 : 180;
  const H   = isMob ? 150 : 190;
  cv.width  = W;
  cv.height = H;
  const ctx = cv.getContext('2d');

  // Scale factor
  const S = W / 260;

  function draw(flicker) {
    ctx.clearRect(0, 0, W, H);

    const cx = W / 2;  // center x

    /* ── PLATE ── */
    ctx.save();
    const plateGrad = ctx.createEllipse
      ? null
      : (() => {
          const g = ctx.createLinearGradient(cx-90*S, H-18*S, cx+90*S, H-10*S);
          g.addColorStop(0, '#e8c8d8'); g.addColorStop(0.5, '#fff0f5'); g.addColorStop(1, '#e8c8d8');
          return g;
        })();
    ctx.fillStyle = plateGrad || '#f8e8f0';
    ctx.shadowColor = 'rgba(0,0,0,0.15)'; ctx.shadowBlur = 10*S;
    ctx.beginPath();
    ctx.ellipse(cx, H-14*S, 100*S, 14*S, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();

    /* ── BOTTOM TIER ── */
    function drawTier(x, y, w, h, colorTop, colorMid, colorBot, hasDeco) {
      // Body gradient
      const g = ctx.createLinearGradient(x-w/2, y, x+w/2, y);
      g.addColorStop(0,   colorBot);
      g.addColorStop(0.15, colorMid);
      g.addColorStop(0.5,  colorTop);
      g.addColorStop(0.85, colorMid);
      g.addColorStop(1,   colorBot);
      ctx.save();
      ctx.shadowColor = 'rgba(0,0,0,0.18)'; ctx.shadowBlur = 8*S;
      ctx.fillStyle = g;
      // Rounded rect
      const r = 8*S;
      ctx.beginPath();
      ctx.moveTo(x-w/2+r, y);
      ctx.lineTo(x+w/2-r, y);
      ctx.quadraticCurveTo(x+w/2, y, x+w/2, y+r);
      ctx.lineTo(x+w/2, y+h-r);
      ctx.quadraticCurveTo(x+w/2, y+h, x+w/2-r, y+h);
      ctx.lineTo(x-w/2+r, y+h);
      ctx.quadraticCurveTo(x-w/2, y+h, x-w/2, y+h-r);
      ctx.lineTo(x-w/2, y+r);
      ctx.quadraticCurveTo(x-w/2, y, x-w/2+r, y);
      ctx.closePath();
      ctx.fill();
      ctx.restore();

      // Frosting drips from top
      ctx.save();
      ctx.fillStyle = 'rgba(255,255,255,0.92)';
      ctx.shadowColor = 'rgba(255,200,220,0.5)'; ctx.shadowBlur = 4*S;
      for (let d = 0; d < 7; d++) {
        const dx = x - w/2 + 12*S + d * (w-24*S)/6;
        const dh = 6*S + Math.sin(d*1.8)*4*S;
        ctx.beginPath();
        ctx.moveTo(dx - 6*S, y);
        ctx.quadraticCurveTo(dx, y + dh + 4*S, dx + 6*S, y);
        ctx.fill();
      }
      ctx.restore();

      // Decorative dots along middle
      if (hasDeco) {
        const dotColors = ['#ff80ab','#ffb3c6','#f48fb1','#e91e8c','#ffcdd2'];
        for (let d = 0; d < 8; d++) {
          const dx = x - w/2 + 16*S + d*(w-32*S)/7;
          ctx.save();
          ctx.fillStyle = dotColors[d % dotColors.length];
          ctx.shadowColor = dotColors[d % dotColors.length]; ctx.shadowBlur = 5*S;
          ctx.beginPath();
          ctx.arc(dx, y + h/2, 3.5*S, 0, Math.PI*2);
          ctx.fill();
          ctx.restore();
        }
      }

      // Small flowers on mid tier
      if (!hasDeco) {
        for (let f = 0; f < 4; f++) {
          const fx = x - w/2 + 18*S + f*(w-36*S)/3;
          const fy = y + h/2;
          drawFlower(ctx, fx, fy, 5*S, S);
        }
      }
    }

    function drawFlower(ctx, fx, fy, r, S) {
      const petalC = ['#ff80ab','#f48fb1','#ffb3c6','#e91e8c'];
      for (let p = 0; p < 5; p++) {
        const a = (p/5)*Math.PI*2;
        ctx.save();
        ctx.fillStyle = petalC[p % petalC.length];
        ctx.beginPath();
        ctx.ellipse(fx+Math.cos(a)*r*0.8, fy+Math.sin(a)*r*0.8, r*0.55, r*0.35, a, 0, Math.PI*2);
        ctx.fill();
        ctx.restore();
      }
      ctx.save();
      ctx.fillStyle = '#fff176';
      ctx.beginPath(); ctx.arc(fx, fy, r*0.38, 0, Math.PI*2); ctx.fill();
      ctx.restore();
    }

    // Bottom tier
    drawTier(cx, H-90*S, 180*S, 55*S, '#fce4ec', '#f8bbd0', '#f48fb1', true);
    // Top tier (2nd layer)
    drawTier(cx, H-148*S, 136*S, 50*S, '#fff0f5', '#fce4ec', '#f8bbd0', false);

    /* ── CANDLES ── */
    const candlePositions = [
      { x: cx-28*S, color:'#ff80ab', waxColor:'#ffb3c6' },
      { x: cx,      color:'#f48fb1', waxColor:'#fce4ec'  },
      { x: cx+28*S, color:'#e91e8c', waxColor:'#ff80ab'  },
    ];

    candlePositions.forEach((c, i) => {
      const cy2 = H - 148*S - 6*S;
      const cH  = 28*S;

      // Candle body
      const cg = ctx.createLinearGradient(c.x-5*S, cy2-cH, c.x+5*S, cy2-cH);
      cg.addColorStop(0, '#fff');
      cg.addColorStop(0.4, c.waxColor);
      cg.addColorStop(1, c.color);
      ctx.save();
      ctx.fillStyle = cg;
      ctx.shadowColor = 'rgba(0,0,0,0.1)'; ctx.shadowBlur = 4*S;
      ctx.beginPath();
      ctx.roundRect
        ? ctx.roundRect(c.x-4*S, cy2-cH, 8*S, cH, 3*S)
        : ctx.rect(c.x-4*S, cy2-cH, 8*S, cH);
      ctx.fill();
      ctx.restore();

      // Candle stripe
      ctx.save();
      ctx.strokeStyle = 'rgba(255,255,255,0.5)';
      ctx.lineWidth = 1.5*S;
      for (let s = 0; s < 3; s++) {
        const sy2 = cy2 - cH + 6*S + s*8*S;
        ctx.beginPath(); ctx.moveTo(c.x-4*S, sy2); ctx.lineTo(c.x+4*S, sy2); ctx.stroke();
      }
      ctx.restore();

      // Wick
      ctx.save();
      ctx.strokeStyle = '#5d4037'; ctx.lineWidth = 1.2*S;
      ctx.beginPath(); ctx.moveTo(c.x, cy2-cH); ctx.lineTo(c.x, cy2-cH-5*S); ctx.stroke();
      ctx.restore();

      // FLAME — flickers
      const f = flicker + i * 1.2;
      const fw = 4*S + Math.sin(f*3.1)*1.2*S;
      const fh = 11*S + Math.sin(f*2.3)*2*S;
      const fx2 = c.x + Math.sin(f*1.7)*1.5*S;
      const fy2 = cy2 - cH - 5*S;

      // Outer flame glow
      ctx.save();
      ctx.globalAlpha = 0.3 + Math.sin(f*2)*0.1;
      const flameGlow = ctx.createRadialGradient(fx2, fy2, 0, fx2, fy2, fw*3.5);
      flameGlow.addColorStop(0, 'rgba(255,200,50,0.5)');
      flameGlow.addColorStop(1, 'rgba(255,100,0,0)');
      ctx.fillStyle = flameGlow;
      ctx.beginPath(); ctx.arc(fx2, fy2, fw*3.5, 0, Math.PI*2); ctx.fill();
      ctx.restore();

      // Flame body — outer orange
      ctx.save();
      const flameOuter = ctx.createRadialGradient(fx2, fy2+fh*0.3, 0, fx2, fy2, fh);
      flameOuter.addColorStop(0,   'rgba(255,240,180,1)');
      flameOuter.addColorStop(0.3, 'rgba(255,160,20,1)');
      flameOuter.addColorStop(0.7, 'rgba(255,60,0,0.8)');
      flameOuter.addColorStop(1,   'rgba(255,0,0,0)');
      ctx.fillStyle = flameOuter;
      ctx.beginPath();
      ctx.moveTo(fx2, fy2-fh);
      ctx.bezierCurveTo(fx2+fw*1.2, fy2-fh*0.4, fx2+fw, fy2+fh*0.3, fx2, fy2+fh*0.15);
      ctx.bezierCurveTo(fx2-fw, fy2+fh*0.3, fx2-fw*1.2, fy2-fh*0.4, fx2, fy2-fh);
      ctx.fill();
      ctx.restore();

      // Flame core — bright white/yellow
      ctx.save();
      const flameCore = ctx.createRadialGradient(fx2, fy2, 0, fx2, fy2, fh*0.5);
      flameCore.addColorStop(0,   'rgba(255,255,255,1)');
      flameCore.addColorStop(0.4, 'rgba(255,240,100,0.9)');
      flameCore.addColorStop(1,   'rgba(255,160,0,0)');
      ctx.fillStyle = flameCore;
      ctx.beginPath();
      ctx.ellipse(fx2, fy2-fh*0.2, fw*0.55, fh*0.5, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();

      // Cast light on cake top
      ctx.save();
      ctx.globalAlpha = 0.12 + Math.sin(f*2)*0.04;
      const light = ctx.createRadialGradient(c.x, H-148*S, 0, c.x, H-148*S, 35*S);
      light.addColorStop(0, 'rgba(255,220,100,1)');
      light.addColorStop(1, 'rgba(255,200,50,0)');
      ctx.fillStyle = light;
      ctx.beginPath(); ctx.arc(c.x, H-148*S, 35*S, 0, Math.PI*2); ctx.fill();
      ctx.restore();
    });

    /* ── DECORATIVE RIBBON BOW on bottom tier ── */
    const bowX = cx, bowY = H - 90*S + 28*S;
    ctx.save();
    ctx.fillStyle = '#e91e8c';
    ctx.shadowColor = '#e91e8c'; ctx.shadowBlur = 6*S;
    ctx.beginPath(); ctx.ellipse(bowX-12*S, bowY, 10*S, 6*S, -0.5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(bowX+12*S, bowY, 10*S, 6*S, 0.5, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#ff80ab';
    ctx.beginPath(); ctx.arc(bowX, bowY, 4*S, 0, Math.PI*2); ctx.fill();
    ctx.restore();

    /* ── SMALL STARS scattered around ── */
    const starPositions = [
      {x:cx-80*S, y:H-120*S}, {x:cx+75*S, y:H-110*S},
      {x:cx-60*S, y:H-165*S}, {x:cx+65*S, y:H-158*S},
      {x:cx-85*S, y:H-60*S},  {x:cx+82*S, y:H-58*S},
    ];
    starPositions.forEach((s, i) => {
      const pulse = 0.6 + Math.sin(flicker + i)*0.4;
      ctx.save();
      ctx.globalAlpha = pulse * 0.8;
      ctx.fillStyle = '#ffd700';
      ctx.shadowColor = '#ffd700'; ctx.shadowBlur = 6*S;
      ctx.font = `${9*S}px serif`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('✦', s.x, s.y);
      ctx.restore();
    });
  }

  // Animated flame flicker loop
  let flicker = 0;
  (function animCake() {
    flicker += 0.07;
    draw(flicker);
    requestAnimationFrame(animCake);
  })();
}

const cv    = document.getElementById('confetti-canvas');

resizeCV(); window.addEventListener('resize', resizeCV);
